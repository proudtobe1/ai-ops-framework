name: Bug Report
description: Report a problem or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the details below.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Brief description of the issue
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Select the specific area of the framework where the bug occurs.
      options:
        - .github (Governance & Workflows)
        - docs (Core Documentation)
        - starter-prompts (AI Prompt Assets)
        - systems (Operating Models & Schemas)
        - templates (Communication Frameworks)
        - use-cases (Reference Scenarios)
        - workflows (Repeatable Processes)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
