name: "💡 Feature Request"
description: "Propose a new system, workflow, or framework enhancement."
title: "[FEATURE]: <Short Description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🚀 AI-Ops Framework Feature Proposal
        Thank you for helping scale the framework. Before submitting, please review the `ROADMAP.md` to ensure this feature is not already planned, and verify that your proposal aligns with our core principle: **Clarity over complexity**.
  - type: dropdown
    id: component
    attributes:
      label: "Target Architectural Layer"
      description: "Select the specific framework directory where this feature belongs."
      options:
        - "systems/ (Core Operating Models & Engines)"
        - "workflows/ (Operational Cadences)"
        - "templates/ (Standardized Docs & Reports)"
        - "validators/ (Python Schema Enforcers)"
        - "starter-prompts/ (AI Execution Instructions)"
        - "docs/ (Reference & Architecture Docs)"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: "Feature Summary"
      description: "A clear and concise description of the proposed feature or system."
    validations:
      required: true
  - type: textarea
    id: business_value
    attributes:
      label: "Operational / Business Value"
      description: "Why is this feature important? What operational bottleneck does it solve?"
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: "Proposed Implementation"
      description: "How should this be structured? Include proposed file names (e.g., ai-ops-workflow-new.md) or schema updates."
    validations:
      required: true
  - type: checkboxes
    id: governance_alignment
    attributes:
      label: "Governance & Alignment Check"
      description: "Please confirm the following before submitting:"
      options:
        - label: "I have checked the `ROADMAP.md` and `FAQ.md` for duplicates."
          required: true
        - label: "This feature adheres to the core framework principles (Clarity, Repeatability, Scalability)."
          required: true
