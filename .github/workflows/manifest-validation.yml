name: Manifest & Naming Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-manifest:
    name: Validate Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JSON Schema Validator
        run: npm install -g ajv-cli

      - name: Validate ai-ops-manifest.json
        run: |
          ajv validate \
            -s schema/ai-ops-manifest.schema.json \
            -d ai-ops-manifest.json

      - name: All checks passed
        run: echo "✅ Manifest validation passed."
