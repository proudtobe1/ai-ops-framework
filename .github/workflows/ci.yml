name: AI-Ops CI Pipeline

on: [push, pull_request]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run System Linter
        run: node systems/scripts/ai-ops-system-linter.js
      - name: Build Docs
        run: |
          pip install mkdocs-material
          mkdocs build --clean
