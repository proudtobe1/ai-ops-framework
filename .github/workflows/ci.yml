name: CI Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install linters (Node + Python)
        run: |
          npm install -g markdownlint-cli jsonlint
          pip install yamllint

      - name: Lint Markdown
        run: markdownlint "**/*.md"

      - name: Lint JSON
        run: |
          find . -name "*.json" -print0 | xargs -0 -I {} jsonlint -q {}

      - name: Lint YAML
        run: yamllint .
