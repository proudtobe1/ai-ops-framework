name: AI-Ops CI Pipeline

on: [push, pull_request]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Run System Linter
        run: node systems/scripts/ai-ops-system-linter.js
      - name: Build Docs
        run: |
          pip install mkdocs-material
          mkdocs build --clean
