name: Structural Linter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  structural-lint:
    name: Run Structural Integrity Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run structural integrity linter
        run: |
          node scripts/lint-structure.js

      - name: Linter passed
        run: echo "✅ Structural integrity checks passed."

