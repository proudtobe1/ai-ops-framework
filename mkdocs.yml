site_name: AI-Ops Framework
site_description: An automation‑ready operating system and governance framework for modern organizations.
site_author: Mary Jane and Company, LLC
site_url: https://proudtobe1.github.io/ai-ops-framework

strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - admonition

nav:
  - Home: index.md
  
  - Overview:
      - Documentation Overview: ai-ops-docs-overview.md
      - Visual Index: ai-ops-docs-visual-index.md
      - Operating Playbook: ai-ops-docs-operating-playbook.md

  - Architecture:
      - Deep Dive: ai-ops-architecture-deep-dive.md
      - Data Flow: ai-ops-data-flow.md
      - Expanded Diagrams: ai-ops-docs-expanded-diagrams.md
      - Dependency Map: ai-ops-docs-dependency-map.md
      - LLM Loading Guide: ai-ops-docs-llm-loading-guide.md

  - Core Systems:
      - System Overview: ai-ops-system-overview.md
      - Alignment Engine: ai-ops-template-alignment-check.md
      - Decision Record: ai-ops-template-decision-record.md

  - Agent Lifecycle & Governance:
      - Behavior Rules: ai-agent-behavior-rules.md
      - Certification Pathway: ai-agent-certification-pathway.md
      - Evaluation Rubric: ai-agent-evaluation-rubric.md
      - Failure Modes & Recovery: ai-agent-failure-modes-recovery.md
      - Integration Guide: ai-agent-integration-guide.md
      - Integration Model: ai-agent-integration.md
      - Output Contract: ai-agent-output-contract.md
      - Test Suite: ai-agent-test-suite.md
      - Contribution Governance: ai-ops-contribution-governance-model.md
      - Maturity Model: ai-ops-maturity-model.md
      - Framework Extensions: ai-ops-framework-extension-guide.md
