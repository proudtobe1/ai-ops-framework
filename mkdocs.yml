site_name: AI-Ops Framework
site_description: An automation‑ready operating system and governance framework for modern organizations.
site_author: Mary Jane and Company, LLC
site_url: https://proudtobe1.github.io/ai-ops-framework

strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - admonition

nav:
  - Home: index.md

  - Documentation Overview:
      - Overview: docs/ai-ops-docs-overview.md
      - Visual Index: docs/ai-ops-docs-visual-index.md
      - Operating Playbook: docs/ai-ops-docs-operating-playbook.md

  - Core Architecture:
